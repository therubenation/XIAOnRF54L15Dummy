# Available runners configured by board.cmake.
runners:
- openocd
- nrfutil
- nrfjprog
- jlink

# Default flash runner if --runner is not given.
flash-runner: openocd

# Default debug runner if --runner is not given.
debug-runner: openocd

# Common runner configuration values.
config:
  board_dir: /opt/nordic/ncs/v3.2.4/zephyr/boards/seeed/xiao_nrf54l15
  # Build outputs:
  elf_file: zephyr.elf
  hex_file: /Users/rubensteijn/GitHub/XIAOnRF54L15Dummy/build/merged.hex
  bin_file: zephyr.bin
  # Host tools:
  gdb: /opt/nordic/ncs/toolchains/185bb0e3b6/opt/zephyr-sdk/arm-zephyr-eabi/bin/arm-zephyr-eabi-gdb
  openocd: /opt/homebrew/bin/openocd
  openocd_search:
    - /opt/nordic/ncs/toolchains/185bb0e3b6/opt/zephyr-sdk/sysroots/arm64-pokysdk-linux/usr/share/openocd/scripts

# Runner specific arguments
args:
  openocd:
    - --cmd-load
    - flash write_image erase
    - --cmd-verify
    - verify_image
    - --cmd-load=nrf54l-load
    - -c
    - targets nrf54l.cpu
  nrfutil:
    []

  nrfjprog:
    []

  jlink:
    - --dt-flash=y
    - --device=nRF54L15_M33
    - --speed=4000
